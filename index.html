<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上海 → 西双版纳 机票价格监测</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f0f2f5;
    color: #1a1a1a;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #00b277 0%, #007a52 100%);
    color: #fff;
    padding: 18px 20px 14px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .header h1 { font-size: 1.2rem; font-weight: 700; }
  .header .meta { font-size: 0.72rem; opacity: 0.8; text-align: right; line-height: 1.5; }

  /* ── Hero ── */
  .hero {
    margin: 14px 14px 0;
    background: #fff;
    border-radius: 12px;
    padding: 16px 20px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .hero-label { font-size: 0.72rem; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .hero-price { font-size: 2.4rem; font-weight: 800; color: #00b277; line-height: 1; margin-top: 4px; }
  .hero-detail { font-size: 0.82rem; color: #555; margin-top: 5px; }
  .hero-badge {
    display: inline-block;
    background: #e6f7f1;
    color: #007a52;
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 0.7rem;
    font-weight: 700;
    margin-left: 6px;
    vertical-align: middle;
  }
  .hero-divider { width: 1px; background: #eee; align-self: stretch; }
  .hero-tip { font-size: 0.78rem; color: #888; line-height: 1.6; }
  .hero-tip strong { color: #333; }

  /* ── Section ── */
  .section {
    margin: 12px 14px 0;
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
  }
  .section-title {
    font-size: 0.82rem;
    font-weight: 700;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 14px;
  }

  /* ── Compare Table ── */
  .compare-table { width: 100%; border-collapse: collapse; }
  .compare-table th {
    font-size: 0.72rem;
    color: #888;
    font-weight: 600;
    text-align: center;
    padding: 0 8px 10px;
    border-bottom: 1px solid #f0f0f0;
  }
  .compare-table th.left { text-align: left; }
  .compare-table td {
    padding: 10px 8px;
    text-align: center;
    border-bottom: 1px solid #f7f7f7;
    font-size: 0.9rem;
  }
  .compare-table td.date-col {
    text-align: left;
    font-weight: 600;
    color: #333;
    font-size: 0.82rem;
    white-space: nowrap;
  }
  .compare-table tr:last-child td { border-bottom: none; }
  .price-cell { font-weight: 700; }
  .price-cell.best { color: #00b277; }
  .price-cell.no-data { color: #ccc; font-size: 0.75rem; font-weight: 400; }
  .delta-tag {
    display: inline-block;
    font-size: 0.65rem;
    font-weight: 600;
    padding: 1px 4px;
    border-radius: 3px;
    margin-left: 3px;
    vertical-align: middle;
  }
  .delta-up { background: #fff0f0; color: #e5383b; }
  .delta-down { background: #e6f7f1; color: #00894d; }
  .winner-badge {
    display: inline-block;
    background: #e6f7f1;
    color: #007a52;
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 0.65rem;
    font-weight: 700;
  }

  /* ── Chart ── */
  canvas { max-width: 100%; }
  .no-data-msg {
    text-align: center;
    padding: 32px 16px;
    color: #bbb;
    font-size: 0.85rem;
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    font-size: 0.7rem;
    color: #bbb;
    padding: 16px 16px 28px;
    margin-top: 12px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>上海 → 西双版纳</h1>
  <div class="meta" id="headerMeta">—</div>
</div>

<div class="hero" id="heroSection">
  <div>
    <div class="hero-label">当前最低价</div>
    <div class="hero-price" id="heroPrice">—</div>
    <div class="hero-detail" id="heroDetail"></div>
  </div>
  <div class="hero-divider"></div>
  <div class="hero-tip" id="heroTip"></div>
</div>

<div class="section">
  <div class="section-title">出发日期比价</div>
  <table class="compare-table" id="compareTable">
    <thead>
      <tr>
        <th class="left">出发日期</th>
        <th>浦东 PVG</th>
        <th>虹桥 SHA</th>
        <th>更低</th>
      </tr>
    </thead>
    <tbody id="compareBody"></tbody>
  </table>
</div>

<div class="section">
  <div class="section-title" id="chartTitle">价格对比</div>
  <div id="chartArea"></div>
</div>

<div class="footer" id="footer">
  数据来源：Trip.com 公开搜索结果 · 单程经济舱最低价
</div>

<script>
// ── 内嵌数据（由 agent 每次运行时替换） ──────────────────────────────────────
const PRICES = [{"snapshot_at":"2026-04-27T10:26:31+08:00","depart_date":"2026-05-04","origin":"PVG","destination":"JHG","min_price_cny":980,"raw_price":143,"raw_currency":"USD","usd_to_cny":6.85,"carrier":"","source":"trip.com"},{"snapshot_at":"2026-04-27T10:26:31+08:00","depart_date":"2026-05-11","origin":"PVG","destination":"JHG","min_price_cny":980,"raw_price":143,"raw_currency":"USD","usd_to_cny":6.85,"carrier":"","source":"trip.com"},{"snapshot_at":"2026-04-27T10:26:31+08:00","depart_date":"2026-05-18","origin":"PVG","destination":"JHG","min_price_cny":980,"raw_price":143,"raw_currency":"USD","usd_to_cny":6.85,"carrier":"","source":"trip.com"},{"snapshot_at":"2026-04-27T10:26:31+08:00","depart_date":"2026-05-25","origin":"PVG","destination":"JHG","min_price_cny":980,"raw_price":143,"raw_currency":"USD","usd_to_cny":6.85,"carrier":"","source":"trip.com"},{"snapshot_at":"2026-04-27T10:26:31+08:00","depart_date":"2026-05-04","origin":"SHA","destination":"JHG","min_price_cny":980,"raw_price":143,"raw_currency":"USD","usd_to_cny":6.85,"carrier":"","source":"trip.com"},{"snapshot_at":"2026-04-27T10:26:31+08:00","depart_date":"2026-05-11","origin":"SHA","destination":"JHG","min_price_cny":980,"raw_price":143,"raw_currency":"USD","usd_to_cny":6.85,"carrier":"","source":"trip.com"}];
// ────────────────────────────────────────────────────────────────────────────

function fmtTime(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  const mo = String(d.getMonth() + 1).padStart(2, "0");
  const da = String(d.getDate()).padStart(2, "0");
  const hh = String(d.getHours()).padStart(2, "0");
  const mm = String(d.getMinutes()).padStart(2, "0");
  return `${mo}-${da} ${hh}:${mm}`;
}

function fmtDate(dateStr) {
  // "2026-05-04" → "5/4"
  const parts = dateStr.split("-");
  return `${parseInt(parts[1])}/${parseInt(parts[2])}`;
}

// 获取某 origin+date 的最新价格
function latestFor(origin, date) {
  return PRICES
    .filter(p => p.origin === origin && p.depart_date === date)
    .sort((a, b) => b.snapshot_at.localeCompare(a.snapshot_at))[0] ?? null;
}

// 获取某 origin+date 的前一次价格
function prevFor(origin, date) {
  const sorted = PRICES
    .filter(p => p.origin === origin && p.depart_date === date)
    .sort((a, b) => b.snapshot_at.localeCompare(a.snapshot_at));
  return sorted[1] ?? null;
}

function deltaTag(latest, prev) {
  if (!prev) return "";
  const diff = latest.min_price_cny - prev.min_price_cny;
  if (diff > 0) return `<span class="delta-tag delta-up">▲${diff}</span>`;
  if (diff < 0) return `<span class="delta-tag delta-down">▼${Math.abs(diff)}</span>`;
  return "";
}

function render() {
  if (!PRICES.length) {
    document.getElementById("heroPrice").textContent = "暂无数据";
    document.getElementById("chartArea").innerHTML = '<div class="no-data-msg">首次成功抓取后数据将显示在此</div>';
    return;
  }

  // ── 基础推导 ──
  const allDates = [...new Set(PRICES.map(p => p.depart_date))].sort();
  const allOrigins = [...new Set(PRICES.map(p => p.origin))].sort();
  const allSnapTimes = [...new Set(PRICES.map(p => p.snapshot_at))].sort();
  const lastSnap = allSnapTimes.at(-1);

  // ── Header meta ──
  document.getElementById("headerMeta").innerHTML =
    `最近更新 ${fmtTime(lastSnap)}<br>北京时间`;

  // ── 找全局最低价 ──
  let heroRec = null;
  for (const origin of allOrigins) {
    for (const date of allDates) {
      const rec = latestFor(origin, date);
      if (rec && (heroRec === null || rec.min_price_cny < heroRec.min_price_cny)) {
        heroRec = rec;
      }
    }
  }

  if (heroRec) {
    document.getElementById("heroPrice").textContent = `¥${heroRec.min_price_cny.toLocaleString()}`;
    const airportName = heroRec.origin === "PVG" ? "浦东出发" : "虹桥出发";
    document.getElementById("heroDetail").innerHTML =
      `${airportName} · ${fmtDate(heroRec.depart_date)} 出发<span class="hero-badge">最低价</span>`;

    // tip：多个日期的价格差异分析
    const latestPrices = [];
    for (const origin of allOrigins) {
      for (const date of allDates) {
        const rec = latestFor(origin, date);
        if (rec) latestPrices.push(rec.min_price_cny);
      }
    }
    const maxPrice = Math.max(...latestPrices);
    const minPrice = Math.min(...latestPrices);
    if (maxPrice === minPrice) {
      document.getElementById("heroTip").innerHTML =
        `<strong>所有日期价格相同</strong><br>暂无明显价差，可按出行时间灵活选择`;
    } else {
      document.getElementById("heroTip").innerHTML =
        `<strong>最高差价 ¥${maxPrice - minPrice}</strong><br>选对出发日期可省一笔`;
    }
  }

  // ── 比价表 ──
  const tbody = document.getElementById("compareBody");
  tbody.innerHTML = "";
  for (const date of allDates) {
    const pvgRec = latestFor("PVG", date);
    const shaRec = latestFor("SHA", date);
    const pvgPrev = prevFor("PVG", date);
    const shaPrev = prevFor("SHA", date);

    const pvgPrice = pvgRec?.min_price_cny ?? null;
    const shaPrice = shaRec?.min_price_cny ?? null;

    const bothHave = pvgPrice !== null && shaPrice !== null;
    const pvgWins = bothHave && pvgPrice < shaPrice;
    const shaWins = bothHave && shaPrice < pvgPrice;

    const pvgCell = pvgPrice !== null
      ? `<span class="price-cell${pvgWins ? " best" : ""}">¥${pvgPrice.toLocaleString()}</span>${deltaTag(pvgRec, pvgPrev)}`
      : `<span class="price-cell no-data">—</span>`;

    const shaCell = shaPrice !== null
      ? `<span class="price-cell${shaWins ? " best" : ""}">¥${shaPrice.toLocaleString()}</span>${deltaTag(shaRec, shaPrev)}`
      : `<span class="price-cell no-data">—</span>`;

    let winnerCell = "";
    if (pvgWins) winnerCell = `<span class="winner-badge">PVG</span>`;
    else if (shaWins) winnerCell = `<span class="winner-badge">SHA</span>`;
    else if (bothHave) winnerCell = `<span style="font-size:0.7rem;color:#aaa">持平</span>`;
    else winnerCell = `<span style="font-size:0.7rem;color:#ddd">—</span>`;

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="date-col">${fmtDate(date)} 出发</td>
      <td>${pvgCell}</td>
      <td>${shaCell}</td>
      <td>${winnerCell}</td>
    `;
    tbody.appendChild(tr);
  }

  // ── 图表：1次快照→柱状图对比；多次快照→折线走势 ──
  const chartArea = document.getElementById("chartArea");
  chartArea.innerHTML = "";
  const canvas = document.createElement("canvas");
  chartArea.appendChild(canvas);

  if (allSnapTimes.length === 1) {
    // 单次快照：柱状图，横轴=出发日期，分组=PVG/SHA
    document.getElementById("chartTitle").textContent = "各日期价格对比";
    const pvgData = allDates.map(d => latestFor("PVG", d)?.min_price_cny ?? null);
    const shaData = allDates.map(d => latestFor("SHA", d)?.min_price_cny ?? null);

    new Chart(canvas, {
      type: "bar",
      data: {
        labels: allDates.map(fmtDate),
        datasets: [
          {
            label: "浦东 PVG",
            data: pvgData,
            backgroundColor: "#00b277cc",
            borderRadius: 5,
            borderSkipped: false,
          },
          {
            label: "虹桥 SHA",
            data: shaData,
            backgroundColor: "#66cfa8cc",
            borderRadius: 5,
            borderSkipped: false,
          },
        ],
      },
      options: {
        responsive: true,
        interaction: { mode: "index", intersect: false },
        plugins: {
          legend: { position: "bottom", labels: { font: { size: 11 }, padding: 12, boxWidth: 12 } },
          tooltip: {
            callbacks: {
              label: ctx => ctx.parsed.y != null ? `${ctx.dataset.label}: ¥${ctx.parsed.y.toLocaleString()}` : `${ctx.dataset.label}: 无数据`
            }
          }
        },
        scales: {
          x: { grid: { display: false }, ticks: { font: { size: 11 } } },
          y: {
            beginAtZero: false,
            ticks: { callback: v => "¥" + v.toLocaleString(), font: { size: 10 } },
            grid: { color: "#f0f0f0" }
          }
        }
      }
    });

  } else {
    // 多次快照：折线走势，每条线=一个 origin+date 组合
    document.getElementById("chartTitle").textContent = "价格走势";
    canvas.height = 260;

    const COLORS = [
      "#00b277", "#007a52", "#35c98a", "#00694a",
      "#00c9ff", "#0077b6", "#48cae4", "#0096c7",
    ];
    let colorIdx = 0;
    const datasets = [];
    for (const origin of allOrigins) {
      for (const date of allDates) {
        const series = PRICES
          .filter(p => p.origin === origin && p.depart_date === date)
          .sort((a, b) => a.snapshot_at.localeCompare(b.snapshot_at));
        if (!series.length) continue;
        const map = Object.fromEntries(series.map(p => [p.snapshot_at, p.min_price_cny]));
        datasets.push({
          label: `${origin} ${fmtDate(date)}出发`,
          data: allSnapTimes.map(t => map[t] ?? null),
          borderColor: COLORS[colorIdx % COLORS.length],
          backgroundColor: COLORS[colorIdx % COLORS.length] + "22",
          tension: 0.3,
          spanGaps: true,
          pointRadius: 4,
          pointHoverRadius: 6,
          borderWidth: 2,
        });
        colorIdx++;
      }
    }

    new Chart(canvas, {
      type: "line",
      data: {
        labels: allSnapTimes.map(fmtTime),
        datasets,
      },
      options: {
        responsive: true,
        interaction: { mode: "index", intersect: false },
        plugins: {
          legend: { position: "bottom", labels: { font: { size: 10 }, padding: 8, boxWidth: 12 } },
          tooltip: {
            callbacks: {
              label: ctx => ctx.parsed.y != null ? `${ctx.dataset.label}: ¥${ctx.parsed.y.toLocaleString()}` : `${ctx.dataset.label}: 无数据`
            }
          }
        },
        scales: {
          x: { ticks: { font: { size: 10 }, maxRotation: 40 }, grid: { color: "#f0f0f0" } },
          y: {
            ticks: { callback: v => "¥" + v.toLocaleString(), font: { size: 10 } },
            grid: { color: "#f0f0f0" }
          }
        }
      }
    });
  }
}

render();
</script>
</body>
</html>
